apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sohail-24/devops-ecommerce-kubeadm
    targetRevision: main
    path: helm-charts/django-ecommerce
    helm:
      valueFiles:
        - values.yaml
        - values-kubeadm.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: ecommerce
    

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
